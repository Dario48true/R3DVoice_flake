appId: com.r3dwolfie.redvoice
productName: RedVoice
copyright: Copyright © 2026 R3dWolfie

protocols:
  - name: RedVoice
    schemes:
      - redvoice

directories:
  output: release
  buildResources: build

files:
  - "out/**/*"
  - "package.json"

asar: true

linux:
  target:
    - AppImage
    - deb
  category: Network
  # Point at directory of multi-size PNGs so the AppImage bundles
  # 32/48/64/128/256/512/1024 — desktop-integration's findAppIcon walks these.
  icon: build/icons
  # Stable filename across versions: electron-updater replaces the file in
  # place after download, so the user's shortcut keeps pointing at the right
  # path forever. Version is still in latest-linux.yml + the release tag.
  artifactName: ${productName}.${ext}
  # Override the executable name away from the sanitized package name
  # (@redvoiceclient). Affects WMClass matching + .desktop lookups.
  executableName: redvoice
  desktop:
    entry:
      Name: RedVoice
      Comment: Open-source screenshare + voice chat
      Categories: Network;Chat;AudioVideo;
      StartupWMClass: RedVoice
      MimeType: x-scheme-handler/redvoice;

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: build/icon.png
  artifactName: ${productName}-Setup.${ext}

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true

mac:
  target:
    - dmg
  category: public.app-category.social-networking
  icon: build/icon.png
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  artifactName: ${productName}.${ext}

publish:
  provider: github
  owner: R3dWolfie
  repo: RedVoice
  releaseType: release
