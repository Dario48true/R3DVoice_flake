name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install workspace
        run: pnpm install --frozen-lockfile

      - name: Build shared types
        run: pnpm --filter @redvoice/shared build

      - name: Generate Prisma client (server typecheck dep)
        run: pnpm --filter @redvoice/server exec prisma generate

      - name: Build server
        run: pnpm --filter @redvoice/server build

      - name: Setup MSBuild (Windows)
        if: matrix.os == 'windows-latest'
        uses: microsoft/setup-msbuild@v2

      - name: Build native system-audio-capture helper (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        working-directory: apps/client/native/system-audio-capture-win
        run: |
          nuget restore SystemAudioCapture.sln -PackagesDirectory packages
          msbuild SystemAudioCapture.vcxproj /p:Configuration=Release /p:Platform=x64 /p:WarningLevel=2
          New-Item -ItemType Directory -Force -Path ../../build/native | Out-Null
          Copy-Item x64/Release/system-audio-capture.exe ../../build/native/system-audio-capture.exe -Force

      - name: Build client
        run: pnpm --filter @redvoice/client run build

      - name: Package + publish (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: pnpm --filter @redvoice/client exec electron-builder --linux AppImage deb --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Package + publish (Windows)
        if: matrix.os == 'windows-latest'
        run: pnpm --filter @redvoice/client exec electron-builder --win nsis --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Package + publish (macOS)
        if: matrix.os == 'macos-latest'
        run: pnpm --filter @redvoice/client exec electron-builder --mac dmg --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
